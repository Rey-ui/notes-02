<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <title>notes-02</title>
  </head>
  <body data-theme="Light">
    <header class="header">
      <div class="container header__container">
        <a href="#" class="header__logo-container">
          <div class="header__logo">
            <svg width="28" height="28">
              <use
                href="./src/images/svg/symbol-defs.svg#icon-document-text"
              ></use>
            </svg>
          </div>
          <span class="header__text">Clarity</span>
        </a>
        <button class="header__theme-btn">
          <div class="header__theme-svg-cont">
            <svg class="header__theme-svg" width="40" height="40">
              <use href="./src/images/svg/symbol-defs.svg#icon-sun1"></use>
            </svg>
          </div>
          <span class="header__theme-text">Light</span>
        </button>
      </div>
    </header>
    <main class="main">
      <section class="notes-hero section">
        <div class="container hero-container">
          <div class="notes-hero__form-container">
            <h2 class="notes-hero__form-title">
              <span>Create Note</span>
              <svg class="header__theme-svg" width="20" height="20">
                <use href="./src/images/svg/symbol-defs.svg#icon-edit-2"></use>
              </svg>
            </h2>
            <form class="notes-hero__form notes-form">
              <div class="notes-form__content">
                <label class="notes-form__label">
                  <h3 class="notes-form__title">Title:</h3>
                  <input
                    class="notes-form__input"
                    type="text"
                    name="noteTitle"
                    placeholder="Enter note title..."
                  />
                </label>
                <label class="notes-form__label">
                  <h3 class="notes-form__title">Content:</h3>
                  <textarea
                    class="notes-form__textarea"
                    type="text"
                    name="noteText"
                    placeholder="Enter note text..."
                  ></textarea>
                </label>
                <label class="notes-form__label">
                  <h3 class="notes-form__title">Priority:</h3>
                  <div class="notes-form__priorities form-priorities">
                    <label class="form-prioritet__label"
                      ><span class="form-prioritet__text">High-1</span
                      ><input
                        type="radio"
                        name="priority"
                        value="Top-1"
                        class="form-prioritet__input" /></label
                    ><label class="form-prioritet__label"
                      ><span class="form-prioritet__text">Medium-2</span
                      ><input
                        class="form-prioritet__input"
                        type="radio"
                        name="priority"
                        value="Secondary-2"
                    /></label>
                    <label class="form-prioritet__label"
                      ><span class="form-prioritet__text">Low-3</span
                      ><input
                        class="form-prioritet__input"
                        type="radio"
                        name="priority"
                        value="Third-3"
                    /></label>
                  </div>
                </label>
              </div>
              <button type="submit" class="notes-form__btn">
                <svg class="header__theme-svg" width="40" height="40">
                  <use href="./src/images/svg/symbol-defs.svg#icon-plus"></use>
                </svg>
                <span class="notes-form__btn-text">Add Note</span>
              </button>
            </form>
          </div>
          <aside class="notes-hero__details-bar details-bar">
            <div class="details-bar__info">
              <div class="details-bar__quote">
                <div class="details-bar__quote-header">
                  <h3 class="details-bar__quote-title">
                    <svg width="28" height="28">
                      <use
                        href="./src/images/svg/symbol-defs.svg#icon-library"
                      ></use>
                    </svg>
                    <span>Daily quote</span>
                  </h3>
                  <button class="details-bar__quote-btn">
                    <svg class="details-bar__quote-svg" width="28" height="28">
                      <use
                        href="./src/images/svg/symbol-defs.svg#icon-refresh-cw"
                      ></use>
                    </svg>
                  </button>
                </div>

                <div class="details-bar__quote-container"></div>
              </div>
              <div class="details-bar__statistics">
                <h3 class="details-bar__statistics-title">
                  <svg width="28" height="28">
                    <use
                      href="./src/images/svg/symbol-defs.svg#icon-bar-chart"
                    ></use>
                  </svg>
                  <span>Statistics</span>
                </h3>
                <ul class="details-bar__statistics-list">
                  <li class="details-bar__statistics-item statistics-item">
                    <div class="statistics-item__content">
                      <svg class="statistics-item__svg" width="28" height="28">
                        <use
                          href="./src/images/svg/symbol-defs.svg#icon-circle"
                        ></use>
                      </svg>
                      <h4 class="statistics-item__title">Active</h4>
                    </div>

                    <span class="statistics-item__text" data-name="active"
                      >0</span
                    >
                  </li>
                  <li class="details-bar__statistics-item">
                    <div class="statistics-item__content">
                      <svg class="statistics-item__svg" width="28" height="28">
                        <use
                          href="./src/images/svg/symbol-defs.svg#icon-checkmark-outline"
                        ></use>
                      </svg>
                      <h4 class="statistics-item__title">Finished</h4>
                    </div>
                    <span class="statistics-item__text" data-name="finished"
                      >0</span
                    >
                  </li>
                  <li class="details-bar__statistics-item">
                    <div class="statistics-item__content">
                      <svg class="statistics-item__svg" width="28" height="28">
                        <use
                          href="./src/images/svg/symbol-defs.svg#icon-file-text"
                        ></use>
                      </svg>
                      <h4 class="statistics-item__title">All</h4>
                    </div>
                    <span class="statistics-item__text" data-name="all">0</span>
                  </li>
                </ul>
              </div>
            </div>
            <div>
              <div class="note-filter-stats">
                <button class="note-filter-btn" data-btnName="active">
                  active</button
                ><button class="note-filter-btn" data-btnName="finished">
                  finished
                </button>
                <button class="note-filter-btn" data-btnName="all">all</button>
              </div>
              <select class="note-select-priority" name="selectPriority">
                <option value="all">All</option>
                <option value="Top-1">Top-1</option>
                <option value="Secondary-2">Secondary-2</option>
                <option value="Third-3">Third-3</option>
              </select>
            </div>
          </aside>
        </div>
      </section>
    </main>

    <ul class="note-list">
      <li class="note-item" id="${id}">
        <h4>${title}</h4>
        <span>${priority}</span>
        <p></p>
        <span>${date}</span><button class="note-btn">X</button
        ><button class="note-complitedbtn">complite</button>
      </li>
    </ul>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
